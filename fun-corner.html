<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Margaret - Fun Corner</title>
    <link rel="stylesheet" href="css/style.css">
</head>  
<body>
    <header>
        <h1>Fun Corner</h1>
        {% include nav.html %}
    </header>
    
    <main> 
        <div class="filter-bar">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="research">Research</button>
            <button class="filter-btn" data-filter="art">Art</button>
            <button class="filter-btn" data-filter="tinkering">Tinkering</button>

            <div class="entry-content">

                    <div class="entry-tags">
                        <span class="tag">research</span>
                        <span class="tag">python</span>
                    </div>
                    <p>A short description of the project goes here.</p>
                    <a href="#" class="entry-link">Check it out</a>
                </div>
            </div>
        </div>

        <p>A place to post semi-regular blog-like posts for all my interests.</p>
    </main>

    {% include footer.html %}

</html>
